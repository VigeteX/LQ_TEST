name: WDIO Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Build Docker image
      run: docker build -t wdio-tests .

    - name: Run tests in Docker
      run: docker run --rm -v "${{ github.workspace }}/allure-results:/app/allure-results" wdio-tests

    - name: Upload Allure results
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results