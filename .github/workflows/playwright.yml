name: Playwright Tests (Allure)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Copy previous Allure history
      run: |
        git fetch origin gh-pages || echo "No gh-pages yet"
        mkdir -p allure-results
        git checkout origin/gh-pages -- allure-history || echo "No previous report found"
        cp -r allure-history allure-results/history || echo "No history to copy"

    - name: Run Playwright tests with Allure reporter
      run: npx playwright test --reporter=line,allure-playwright

    - name: Generate Allure report
      run: |
        npx allure generate allure-results --clean -o allure-report
        cp -r allure-report allure-history

    - name: Upload Allure report artifact
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: allure-report
        path: allure-report/
        retention-days: 30

    - name: Deploy Allure report to GitHub Pages
    uses: peaceiris/actions-gh-pages@v4
    with:
      personal_token: ${{ secrets.GH_PAGES_PAT }}
      publish_dir: allure-report
      publish_branch: gh-pages