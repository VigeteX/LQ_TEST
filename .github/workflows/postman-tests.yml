name: Run Postman tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Postman collection
        uses: actions/setup-node@v4
      - name: Install Newman
        run: npm install -g newman
      - name: Run tests
        run: newman run store.collection.json