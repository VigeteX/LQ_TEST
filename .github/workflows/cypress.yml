name: Cypress Tests with Allure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    env:
      CYPRESS_BASE_URL: ${{ secrets.BASE_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Cypress
        run: npx cypress verify

      - name: Run Cypress tests
        run: |
          npx cypress run --browser chrome --reporter @shelex/cypress-allure-plugin
        continue-on-error: false

      - name: Generate Allure Report
        run: |
          npx allure generate cypress/allure-results --clean -o cypress/allure-report

      - name: Upload Allure Report as artifact
        uses: actions/upload-artifact@v3
        with:
          name: allure-report
          path: cypress/allure-report