name: WDIO BrowserStack Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  wdio:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20

    - name: Install dependencies
      run: npm ci

    - name: Run WDIO tests on BrowserStack
      env:
        BROWSERSTACK_USERNAME: "viget_p5C1Ef"
        BROWSERSTACK_ACCESS_KEY: "JcttkD6YqvbwYc9xpCxP"
      run: npm run wdio