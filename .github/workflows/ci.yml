name: WDIO BrowserStack Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  wdio:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20

    - name: Install dependencies
      run: npm ci

    - name: Final debug
      run: |
        echo ">${BROWSERSTACK_USER}<"
        echo ">${BROWSERSTACK_KEY}<"
      env:
        BROWSERSTACK_USER: ${{ secrets.BROWSERSTACK_USER }}
        BROWSERSTACK_KEY: ${{ secrets.BROWSERSTACK_KEY }}

    - name: Run WDIO tests on BrowserStack
      env:
        BROWSERSTACK_USER: ${{ secrets.BROWSERSTACK_USER }}
        BROWSERSTACK_KEY: ${{ secrets.BROWSERSTACK_KEY }}
      run: npm run wdio_all