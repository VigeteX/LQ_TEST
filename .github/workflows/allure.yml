jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox]

    steps:
      - uses: actions/checkout@v3

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: |
          npx playwright test --project=${{ matrix.browser }}

      - name: Save allure results
        if: always()
        run: |
          mkdir -p allure-results-${{ matrix.browser }}
          cp -r allure-results/* allure-results-${{ matrix.browser }} || true

  merge:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Merge reports
        run: |
          mkdir -p allure-results
          cp -r allure-results-chromium/* allure-results/
          cp -r allure-results-firefox/* allure-results/

      - name: Generate report
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report