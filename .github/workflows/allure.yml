name: Pytest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox]

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - run: playwright install --with-deps

      - run: npm install -g allure-commandline --save-dev

      - name: Run tests
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_EMAIL_PREFIX: ${{ secrets.TEST_EMAIL_PREFIX }}
        run: |
          mkdir -p allure-results/${{ matrix.browser }}
          pytest -n auto --alluredir=allure-results/${{ matrix.browser }} --browser_name=${{ matrix.browser }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/${{ matrix.browser }}

  generate-report:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Download firefox results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-firefox
          path: results/firefox

      - name: Download chromium results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-chromium
          path: results/chromium

      - name: Merge allure results
        run: |
          mkdir -p allure-results
          cp -r results/firefox/* allure-results/ || true
          cp -r results/chromium/* allure-results/ || true

      - run: npm install -g allure-commandline --save-dev

      - name: Generate Allure report
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: Send Slack notification
        if: always()
        run: |
          STATUS="${{ needs.test.result }}"
          if [ "$STATUS" = "success" ]; then
            COLOR="#36a64f"
            MESSAGE="✅ All tests passed"
          else
            COLOR="#ff0000"
            MESSAGE="❌ Some tests failed"
          fi

          curl -X POST -H "Content-type: application/json" \
          --data "{
            \"attachments\": [
              {
                \"color\": \"$COLOR\",
                \"title\": \"$MESSAGE\",
                \"text\": \"Allure Report: https://vigetex.github.io/LQ9/\"
              }
            ]
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}